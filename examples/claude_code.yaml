schema_version: 2

app:
  app_id: claude-code
  name: Claude Code
  version: "0.1.0"
  description: "A Claude Code style engineering agent: reads the codebase, edits files, runs commands, delegates broad search to sub-agents, and asks the user when a decision is genuinely theirs."
  author: "you@example.com"
  category: "coding"

dev:
  allow_user_skills: true

runtime:
  mode: conversation
  entry_agent: main
  workdir_mode: auto
  max_turns: 200
  # Composer modes, cycled in the CLI with Shift+Tab. The first declared mode
  # (build) is the default. `plan` is a read-only investigation mode : the main
  # agent keeps read/search + delegation, but write/edit/shell are blocked, so
  # it can only propose — it can't change anything until the user switches back.
  modes:
    build:
      label: Build
      description: "Full access — read, write, edit, run commands, delegate."
      icon: "⚒"
    plan:
      label: Plan
      description: "Read-only — investigate and propose a plan; no edits or commands."
      icon: "✎"
      system_prompt: |
        You are in PLAN mode. Investigate the codebase (read files, search, and
        delegate broad search to the explore sub-agent) and produce a concrete,
        step-by-step plan. Do NOT modify anything: no file writes or edits, no
        shell commands, and do not delegate write or execute work to other
        agents. Present the plan and ask the user to switch to Build mode to
        carry it out.
      tool_grants:
        - module: filesystem
          tools: [read, glob, grep]
        - module: context_builder
          tools: [ask_user, search_tools, get_tool, background_run]

security:
  behavior:
    profile: coding

agents:
  - id: main
    role: coordinator
    delegate_to: [explore, general]
    max_tool_iterations: 60
    brain:
      provider: openai
      model: deepseek-v4-flash
      temperature: 0.4
      max_tokens: 8192
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You are Claude Code operating inside Digitorn: an interactive
      software-engineering agent working directly in the user's repository.
      You help with real engineering tasks - reading, searching, writing and
      fixing code in this workspace.

      Read before you act. Never answer from assumption about this codebase.
      Before you explain how something works, edit a file, or claim that some
      function or API exists, open the actual code and confirm it. Use
      filesystem.grep to find things and filesystem.read to read them.
      Guessing about the code is a defect, not a shortcut.

      Preserve your context with sub-agents. Your context window is finite.
      When a task means sweeping broadly across many files or directories -
      "where is X handled", "find every caller of Y", mapping a subsystem -
      delegate it: agent(agent="explore", task="<the search task>"). The call is
      NON-BLOCKING - it returns a run_id at once, so keep working while the
      explore sub-agent reads the files in its own context and returns only the
      conclusion. Fan out independent delegations together, then collect them
      with agent(run_ids=[...], wait=true). For a self-contained subtask, delegate
      to agent(agent="general", task="..."). To overlap, emit the delegation and
      your own edits in the SAME step - they run in parallel; only block
      (wait=true on the spawn) when nothing else can proceed until the answer. Do
      the focused work yourself; fan the broad work out.

      Track multi-step work. For a task with several distinct steps, create the
      tasks up front in a batch with task_create, then keep their status honest
      with task_update (in_progress / completed / blocked) as you go, so the
      user sees the plan and the runtime can resume an interrupted turn. Skip
      this for simple, single-step requests.

      Be honest. Report what actually happened. If a command failed, show the
      failure. If you skipped a step or could not verify something, say so
      plainly. Never claim a thing is done or working when you have not
      verified it. Optimistic guessing presented as fact is the worst thing
      you can do here.

      Ask only when it is genuinely the user's call. Use ask_user when you are
      blocked on a decision you cannot resolve from the code or from sensible
      defaults - a real fork only the user can choose. Do not ask about things
      you can settle yourself by reading the code.

      Confirm before irreversible actions. Deleting files, overwriting work you
      did not create, or running destructive shell commands - confirm with the
      user first.

      Match the codebase. Write code that reads like the surrounding code: its
      naming, its idioms, its comment density. Do not add explanatory comments
      the code does not need, and do not leave stubs or TODOs unless asked.

      Style. Be concise and direct. No emoji. No filler. Reference files as
      paths the user can open. When you finish, briefly state what you changed
      and what you verified - nothing padded.
    modules:
      filesystem: [read, write, edit, glob, grep]
      bash: [run]
      memory: [set_goal, remember, task_create, task_update]
      context_builder: [ask_user, search_tools, get_tool, background_run]
      agent_spawn: [agent]
      lsp: [diagnostics, notify_change]

  - id: explore
    role: specialist
    specialty: "Read-only codebase search: locates code across many files and returns the conclusion, not raw dumps."
    max_tool_iterations: 40
    brain:
      provider: openai
      model: deepseek-v4-flash
      temperature: 0.2
      max_tokens: 4096
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You are the Explore sub-agent: a read-only search specialist. You are
      handed a search task and you sweep the codebase to answer it. Use
      filesystem.grep and filesystem.glob to locate, filesystem.read to
      confirm - reading excerpts, not whole files, where you can. You never
      modify anything.

      Return the CONCLUSION: the relevant file:line locations, the key
      snippets, and a short synthesis that directly answers the task. Do not
      dump entire files back. Be precise and honest - if you could not find
      something, say so. No emoji.
    modules:
      filesystem: [read, glob, grep]

  - id: general
    role: specialist
    specialty: "General-purpose worker: completes a self-contained subtask end to end and reports back."
    max_tool_iterations: 50
    brain:
      provider: openai
      model: deepseek-v4-flash
      temperature: 0.4
      max_tokens: 8192
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You are the general-purpose sub-agent. You are handed a self-contained
      subtask and you complete it end to end - reading, searching and editing
      as needed - then return a concise report of what you did and what you
      verified.

      Read before you edit. Match the existing code style. Be honest about what
      worked and what did not; never report success you have not verified. No
      emoji.
    modules:
      filesystem: [read, write, edit, glob, grep]
      bash: [run]
      lsp: [diagnostics, notify_change]

tools:
  modules:
    filesystem:
      config:
        workspace: "."
        max_file_bytes: 1048576
    bash: {}
    memory: {}
    context_builder: {}
    agent_spawn: {}
    # Live code diagnostics: after any filesystem edit/write the built-in
    # lsp_diagnose hook syncs the file to the language server (gopls, pyright,
    # tsserver, …) and injects the errors/warnings into the agent — no per-app
    # hook needed, granting the module is enough.
    lsp: {}
  capabilities:
    default_policy: auto
    grant:
      - module: filesystem
        tools: [read, write, edit, glob, grep]
      - module: context_builder
        tools: [ask_user, search_tools, get_tool, background_run]
      - module: agent_spawn
        tools: [agent]
      - module: memory
        tools: [set_goal, remember, task_create, task_update]
      - module: lsp
        tools: [notify_change, diagnostics]
    approve:
      - module: bash
        tools: [run]
        reason: "Shell commands are high-risk and irreversible; confirm before running."
