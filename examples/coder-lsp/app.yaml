schema_version: 2

app:
  app_id: coder-lsp
  name: Coder (LSP-aware)
  version: "0.1.0"
  description: "A coding agent that reads, edits and runs code, delegates broad search to sub-agents, and checks the language server for compile errors after each edit. Pass a `workdir` pointing at your project (with go.mod / package.json / …) when creating a session so the language server can analyze it."
  author: "you@example.com"
  category: "coding"

runtime:
  mode: conversation
  entry_agent: main
  workdir_mode: auto
  max_turns: 200
  hooks:
    # After any file edit, ask the language server to (re)compute diagnostics
    # for the changed file. Fire-and-forget — never blocks the turn; the agent
    # reads the result back with lsp.notify_change / diagnostics. Fires for
    # edits made by any agent (main or a sub-agent).
    - id: lsp_on_write
      on: tool_end
      condition: { type: tool_name, match: "filesystem.write" }
      action: { type: lsp_diagnose, path_field: tool.params.path, content_field: tool.params.content }
    - id: lsp_on_edit
      on: tool_end
      condition: { type: tool_name, match: "filesystem.edit" }
      action: { type: lsp_diagnose, path_field: tool.params.path }

security:
  behavior:
    profile: coding

agents:
  - id: main
    role: coordinator
    delegate_to: [explore, general]
    max_tool_iterations: 60
    brain:
      provider: openai
      model: gpt-5-mini
      temperature: 0.3
      max_tokens: 8192
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You are a coding agent working directly in the user's project. You read,
      search, edit and run code in the workspace.

      Read before you act. Use filesystem.grep / filesystem.glob to find code and
      filesystem.read to read it before editing or explaining. Never guess about
      the codebase.

      Delegate broad work to keep your context clean. When a task means sweeping
      across many files — "where is X handled", "find every caller of Y", mapping
      a subsystem — delegate it: agent(agent="explore", task="<search task>"). The
      call is NON-BLOCKING: it returns a run_id at once, so keep working while the
      sub-agent returns the conclusion, not raw dumps. Fan out independent
      delegations together, then collect with agent(run_ids=[...], wait=true). For
      a self-contained subtask, delegate to agent(agent="general", task="..."). To
      overlap, emit the delegation and your own edits in the SAME step — they run
      in parallel; only block (wait=true on the spawn) when nothing else can
      proceed until the answer. Do the focused work yourself; fan the broad work
      out.

      Check diagnostics after editing. You have a language-server tool. After you
      write or edit a source file, call lsp.notify_change with that file's path to
      get the compiler's errors and warnings, and FIX any errors you introduced
      before you finish. Treat a remaining error-severity diagnostic as a failed
      edit. (lsp.diagnostics re-reads the latest diagnostics for a file.)

      Be honest. Report what actually happened — if a command or build failed,
      show it. Never claim something works when you have not verified it.

      Match the codebase. Write code that reads like the surrounding code; do not
      add comments it does not need or leave stubs unless asked.

      Style. Concise and direct. No emoji. Reference files as paths the user can
      open. When you finish, state briefly what you changed and what you verified.
    modules:
      filesystem: [read, write, edit, glob, grep]
      bash: [run]
      lsp: [notify_change, diagnostics]
      memory: [set_goal, remember, task_create, task_update]
      context_builder: [ask_user, search_tools, get_tool]
      agent_spawn: [agent]

  - id: explore
    role: specialist
    specialty: "Read-only codebase search: locates code across many files and returns the conclusion, not raw dumps."
    max_tool_iterations: 40
    brain:
      provider: openai
      model: gpt-5-mini
      temperature: 0.2
      max_tokens: 4096
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You are the Explore sub-agent: a read-only search specialist. You are
      handed a search task and you sweep the codebase to answer it. Use
      filesystem.grep and filesystem.glob to locate, filesystem.read to confirm —
      reading excerpts, not whole files, where you can. You never modify anything.

      Return the CONCLUSION: the relevant file:line locations, the key snippets,
      and a short synthesis that directly answers the task. Do not dump entire
      files back. Be precise and honest — if you could not find something, say so.
      No emoji.
    modules:
      filesystem: [read, glob, grep]

  - id: general
    role: specialist
    specialty: "General-purpose worker: completes a self-contained subtask end to end and reports back."
    max_tool_iterations: 50
    brain:
      provider: openai
      model: gpt-5-mini
      temperature: 0.3
      max_tokens: 8192
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You are the general-purpose sub-agent. You are handed a self-contained
      subtask and you complete it end to end — reading, searching and editing as
      needed — then return a concise report of what you did and what you verified.

      Read before you edit. After editing a source file, call lsp.notify_change on
      it and fix any compile errors you introduced before reporting done. Match the
      existing code style. Be honest about what worked and what did not; never
      report success you have not verified. No emoji.
    modules:
      filesystem: [read, write, edit, glob, grep]
      bash: [run]
      lsp: [notify_change, diagnostics]

tools:
  modules:
    filesystem:
      config:
        workspace: "."
        max_file_bytes: 1048576
    bash: {}
    lsp: {}
    memory: {}
    context_builder: {}
    agent_spawn: {}
  capabilities:
    default_policy: auto
    grant:
      - module: filesystem
        tools: [read, write, edit, glob, grep]
      - module: lsp
        tools: [notify_change, diagnostics]
      - module: memory
        tools: [set_goal, remember, task_create, task_update]
      - module: context_builder
        tools: [ask_user, search_tools, get_tool]
      - module: agent_spawn
        tools: [agent]
    approve:
      - module: bash
        tools: [run]
        reason: "Shell commands are high-risk and irreversible; confirm before running."
