schema_version: 2

app:
  app_id: legacy-workspace
  name: Legacy Workspace App
  version: "0.1.0"
  description: "Old app declaring the legacy workspace file module; must compile clean through the filesystem alias."
  author: "you@example.com"
  category: "coding"

agents:
  - id: main
    role: worker
    brain:
      provider: anthropic
      model: claude-sonnet-4-6
      temperature: 0.7
      max_tokens: 4096
      config:
        api_key: "sk-ant-test-literal"
    system_prompt: |
      You build files in the workspace.
    modules:
      - workspace

tools:
  modules:
    workspace:
      config:
        workspace: "."
  capabilities:
    default_policy: auto
    grant:
      - module: workspace
        tools: [read, write, edit, glob, grep, delete]
