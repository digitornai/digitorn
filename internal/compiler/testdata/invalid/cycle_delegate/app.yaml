schema_version: 2

app:
  app_id: chat
  name: Chat
  version: "0.1.0"

agents:
  - id: alpha
    role: worker
    delegate_to: [beta]
    brain:
      provider: anthropic
      model: claude-sonnet-4-6
      config:
        api_key: "sk-ant-test"
    system_prompt: "hi"

  - id: beta
    role: worker
    delegate_to: [gamma]
    brain:
      provider: anthropic
      model: claude-sonnet-4-6
      config:
        api_key: "sk-ant-test"
    system_prompt: "hi"

  - id: gamma
    role: worker
    delegate_to: [alpha]
    brain:
      provider: anthropic
      model: claude-sonnet-4-6
      config:
        api_key: "sk-ant-test"
    system_prompt: "hi"
