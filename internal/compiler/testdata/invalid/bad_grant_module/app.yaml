schema_version: 2

app:
  app_id: chat
  name: Chat
  version: "0.1.0"

agents:
  - id: main
    role: worker
    brain:
      provider: anthropic
      model: claude-sonnet-4-6
      config:
        api_key: "sk-ant-test"
    system_prompt: "hi"
    modules:
      - filesystem

tools:
  modules:
    filesystem:
      config:
        workspace: "."
  capabilities:
    default_policy: auto
    grant:
      - module: not_declared_module
        tools: [read]
