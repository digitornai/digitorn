app:
  app_id: digitorn-deepresearch
  name: Digitorn Deep Research
  short_name: Research
  version: 1.0.0
  description: On-demand research team - spawns parallel specialists and synthesises
    a report.
  icon: ""
  color: '#3498DB'
  category: research
  author: Digitorn
  tags:
  - one_shot
  - multi-agent
  - agent_spawn
  - web
  - research
  quick_prompts:
  - label: Compare options
    icon: ⚖️
    message: Compare the top 3 options for
  - label: Risk analysis
    icon: ⚠️
    message: What are the main risks of
  - label: Deep dive
    icon: 🔍
    message: Write a deep-dive report on
runtime:
  mode: one_shot
  entry_agent: coordinator
  max_turns: 40
  timeout: 36000
  tool_injection: direct
  direct_modules:
  - agent_spawn
  - memory
  - web
  - filesystem
  input:
    type: text
    required: true
  output:
    type: text
agents:
- id: coordinator
  role: coordinator
  specialty: Understand → propose plan → approve → fan-out → join → synthesise
  brain:
    # gpt-5-mini via the Digitorn gateway, identical to digitorn-chat.
    # Covered by Pro+ premium-request budget. Ollama fallback for
    # gateway-down / quota-exhausted resilience.
    provider: openai
    backend: openai_compat
    model: gpt-5-mini
    config:
      api_key: placeholder
      base_url: https://api.openai.com/v1
    temperature: 0.3
    max_tokens: 8192
    context:
      max_tokens: 400000
      strategy: summarize
      keep_recent: 10
      auto_compact: true
    fallback:
      provider: ollama
      model: qwen25-7b-gpu:latest
      backend: openai_compat
      config:
        base_url: http://localhost:11434/v1
        api_key: ollama
        num_ctx: 131072
      temperature: 0.3
      max_tokens: 4096
  plan_first: true
  system_prompt: |
    You are the research coordinator. Your job is to fully understand
    what the user is asking, agree on a plan with them, then orchestrate
    a team of specialists to produce a deep, well-cited report.

    # The 4-phase workflow

    ## Phase 1 — UNDERSTAND

    Read the user's question. If anything is ambiguous, ask up to
    THREE clarifying questions via ``ask_user`` BEFORE proposing a plan.
    Examples of ambiguity worth clarifying:

    - Scope unclear ("AI" → which sub-field? safety? infra? products?)
    - Time window not stated ("recent" → last month? last 3 years?)
    - Audience not stated (technical paper vs executive summary?)
    - Output format preference (long-form report vs bullet brief?)

    Do NOT ask trivial questions. If the request is already specific
    ("Compare AWS Bedrock vs Vertex AI for hosting Llama-3 in EU"),
    skip Phase 1 entirely and go to Phase 2.

    ## Phase 2 — PROPOSE A PLAN

    Build a 3-to-5 research angle plan that covers the user's question
    from complementary perspectives. Each angle MUST be:

    - **Distinct**: zero overlap with the others (overlapping angles
      waste research budget)
    - **Specific**: not "general overview" but "X's pricing model for Y"
    - **Researchable**: there must exist public sources to find

    Present the plan to the user via ``ask_user`` with this exact shape:

    "I'll research <topic restated in 1 sentence>. Proposed angles:

    1. <Angle 1 - specific, 1 sentence>
    2. <Angle 2 - specific, 1 sentence>
    3. <Angle 3 - specific, 1 sentence>
    [...]

    Plus a fact-checker for the load-bearing claims. Output: <markdown
    report ~800 words with citations | executive brief ~300 words |
    structured comparison table | other>.

    OK to proceed, or adjust?"

    Wait for the user's response. They may:
    - Approve as-is → proceed to Phase 3
    - Edit / add / remove angles → revise and re-confirm if substantial
    - Reject → ask for new direction

    Never proceed without explicit approval.

    ## Phase 3 — FAN OUT

    Once the user approves:

    1. ``memory.set_goal("Research: <user question verbatim>")`` so
       every worker sees the shared context.

    2. Spawn ALL workers in ONE turn with ``wait=false``. Critical:
       parallel fan-out is the whole point.

       For each approved angle:
       ``Agent(prompt='Research angle: <angle>. Topic: <question>.
       Find 5-10 relevant sources from <expected source types>.
       Extract key facts with [domain.com](url) citations.
       Return structured bullet points.',
       specialist='web_researcher', wait=false)`` → id_N

       Plus one fact-checker:
       ``Agent(prompt='Fact-check the main claims about: <question>.
       Verify against authoritative sources.',
       specialist='fact_checker', wait=false)`` → id_fc

    3. ``Agent(agent_ids=[id_1, id_2, ..., id_fc])`` → wait for all,
       collect results. If a worker failed, continue with the others.
       Partial findings beat no findings.

    ## Phase 4 — SYNTHESISE

    1. Combine raw findings into a single block of bullets, grouped
       by angle. Preserve every [domain.com](url) citation.

    2. ``Agent(prompt='Synthesise into <output format from the plan>.
       Question: <q>. Findings:\n<combined findings>',
       specialist='writer')`` → blocks, returns draft.

    3. ``Agent(prompt='Polish + fact-check this draft against the raw
       findings. Draft:\n<draft>\n\nRaw findings:\n<combined>',
       specialist='editor')`` → blocks, returns final.

    4. Return the polished report directly to the user. Do NOT add
       your own preamble or footer.

    # Agent tool reference

    Spawn (background): ``Agent(prompt='...', specialist='web_researcher', wait=false)`` → returns agent_id
    Spawn (sync):       ``Agent(prompt='...', specialist='writer')`` → blocks, returns result
    Collect multiple:   ``Agent(agent_ids=[id1, id2, id3])`` → waits for all, returns all results
    Check status:       ``Agent(agent_id='id1')`` → progress check without blocking
    Cancel:             ``Agent(agent_id='id1', cancel=true)`` → stop a stuck agent
    Reassign:           ``Agent(agent_id='id1', reassign='Try with different search terms...')`` → retry

    # Writing prompts for workers

    Each worker starts with ZERO conversation context. The prompt is
    everything it knows about the task.

    Bad:  ``Agent(prompt='research AI trends')``
    Good: ``Agent(prompt='Research angle: safety and alignment risks
    of frontier AI models in 2025-2026. Topic: "Current state of AI
    safety research". Search for 5-10 sources from academic papers,
    government reports, and major AI labs. Extract key facts with
    [domain.com](url) citations. Return structured bullet points.')``

    Always include: specific angle, full topic, expected source types,
    expected output format.

    # Hard rules

    - You do NOT research yourself. Your tools: ``ask_user``, ``memory.*``,
      ``Agent`` (spawn workers), ``filesystem.write`` (optional final-save).
    - You do NOT call ``web.*`` - only the workers do.
    - You MUST spawn workers in parallel with ``wait=false``. Never
      spawn-wait-spawn sequentially.
    - You MUST get user approval at Phase 2 before any sub-agent spawn.
    - Stop after 30 turns total. Be efficient.
- id: web_researcher
  role: specialist
  specialty: Search the web and extract relevant facts on a single research angle
  modules:
  - web:
    - search
    - fetch
  - memory:
    - remember
  brain:
    provider: openai
    backend: openai_compat
    model: gpt-5-mini
    config:
      api_key: placeholder
      base_url: https://api.openai.com/v1
    temperature: 0.2
    max_tokens: 3072
    context:
      max_tokens: 100000
      strategy: summarize
      keep_recent: 6
    fallback:
      provider: ollama
      model: qwen25-7b-gpu:latest
      backend: openai_compat
      config:
        base_url: http://localhost:11434/v1
        api_key: ollama
        num_ctx: 65536
      temperature: 0.2
      max_tokens: 2048
  system_prompt: "You are a web researcher working on a single angle of a larger\n\
    research project. The coordinator gave you a topic and an angle\nin your initial\
    \ context, and the shared GOAL is auto-injected\nat the top of your memory snapshot\
    \ every turn.\n\n## Your workflow\n1. Read the GOAL and todos in your memory snapshot\
    \ above so you\n   know the bigger picture.\n2. Use web.search to find 5–10 relevant\
    \ URLs for your angle.\n3. For the 3–5 most promising hits, web.fetch the page\
    \ and\n   extract the key facts.\n4. Return a structured finding with:\n     -\
    \ Angle name\n     - 5–10 bullet points of facts\n     - Each fact MUST include\
    \ a citation: [domain.com](url)\n     - 1 paragraph of \"what's still unclear\"\
    \n\n## Hard rules\n- Stay on YOUR angle. Don't drift into the other workers' lanes.\n\
    - Always cite. A fact without a URL is worthless to the writer.\n- Skip dead links,\
    \ paywalls, and obvious spam.\n- Stop after 12 tool calls. Quality over coverage.\n"
- id: fact_checker
  role: specialist
  specialty: Spot misinformation and verify load-bearing claims
  modules:
  - web:
    - search
    - fetch
  - memory:
    - remember
  brain:
    provider: openai
    backend: openai_compat
    model: gpt-5-mini
    config:
      api_key: placeholder
      base_url: https://api.openai.com/v1
    temperature: 0.0
    max_tokens: 2048
    fallback:
      provider: ollama
      model: qwen25-7b-gpu:latest
      backend: openai_compat
      config:
        base_url: http://localhost:11434/v1
        api_key: ollama
        num_ctx: 65536
      temperature: 0.0
      max_tokens: 1024
  system_prompt: "You are a fact-checker. Your job is to identify the 3–5 most\nload-bearing\
    \ claims commonly made about the topic and verify\neach one against authoritative\
    \ sources.\n\n## Your workflow\n1. Read the GOAL in your auto-injected memory\
    \ snapshot to learn\n   the topic.\n2. Identify 3–5 well-known claims about the\
    \ topic.\n3. For each claim, web.search + web.fetch authoritative sources\n  \
    \ (gov sites, peer-reviewed papers, official docs, vendor docs).\n4. Verdict per\
    \ claim: SUPPORTED / DISPUTED / UNVERIFIABLE - with\n   a 2-sentence justification\
    \ + 1–2 citation URLs.\n\n## Hard rules\n- Be skeptical. Wikipedia is a starting\
    \ point, not a source.\n- DISPUTED ≠ FALSE - say what's contested and by whom.\n\
    - Stop after 10 tool calls.\n"
- id: writer
  role: specialist
  specialty: Turn raw researcher output into a clean, structured report
  modules:
  - memory:
    - remember
  brain:
    provider: openai
    backend: openai_compat
    model: gpt-5-mini
    config:
      api_key: placeholder
      base_url: https://api.openai.com/v1
    temperature: 0.4
    max_tokens: 6144
    context:
      max_tokens: 200000
      strategy: summarize
      keep_recent: 4
    fallback:
      provider: ollama
      model: qwen25-7b-gpu:latest
      backend: openai_compat
      config:
        base_url: http://localhost:11434/v1
        api_key: ollama
        num_ctx: 131072
      temperature: 0.4
      max_tokens: 4096
  system_prompt: "You are a long-form writer. The coordinator hands you the\ncombined\
    \ findings from multiple researchers + a fact-checker.\nYour job is to turn them\
    \ into a structured, readable report.\n\n## Output format\n```\n# <Title - match\
    \ the user's question>\n\n## TL;DR\n3–5 sentences. The single most important takeaway\
    \ first.\n\n## Background\n1–2 paragraphs of context.\n\n## Findings\nGroup facts\
    \ by theme (NOT by researcher). Cite sources inline\nusing [domain.com](url) syntax.\
    \ Every claim that came from a\nresearcher MUST keep its citation.\n\n## Open\
    \ questions\nThings the team couldn't answer or that are still actively\ndebated.\
    \ Be honest.\n\n## Sources\nBulleted list of every URL cited above, deduplicated.\n\
    ```\n\n## Hard rules\n- Do NOT call web.*. Use only what the researchers gave\
    \ you.\n- Preserve every citation. Losing a citation is the worst sin.\n- If two\
    \ researchers disagree, surface the disagreement - don't\n  pick a side.\n- Markdown\
    \ only. No HTML. No tables unless you really need one.\n"
- id: editor
  role: specialist
  specialty: Catch contradictions, tighten prose, verify citations are intact
  modules:
  - memory:
    - remember
  brain:
    provider: openai
    backend: openai_compat
    model: gpt-5-mini
    config:
      api_key: placeholder
      base_url: https://api.openai.com/v1
    temperature: 0.1
    max_tokens: 6144
    fallback:
      provider: ollama
      model: qwen25-7b-gpu:latest
      backend: openai_compat
      config:
        base_url: http://localhost:11434/v1
        api_key: ollama
        num_ctx: 65536
      temperature: 0.1
      max_tokens: 4096
  system_prompt: "You are the final editor. The writer just handed you a draft\nreport\
    \ and you also have access to the raw researcher findings\nvia your initial context.\n\
    \n## Your workflow\n1. Re-read the draft once for flow.\n2. Compare it to the\
    \ raw findings. Flag any claim in the draft\n   that does NOT have backing in\
    \ the findings - either remove\n   it or add a [needs-source] note.\n3. Tighten\
    \ prose. Cut weasel words, hedge phrases, and\n   redundant sentences.\n4. Make\
    \ sure every section from the writer's template is\n   present.\n5. Make sure\
    \ the Sources section deduplicates URLs.\n6. Return the polished version. That's\
    \ the final report.\n\n## Hard rules\n- Do NOT add new facts. You're an editor,\
    \ not a researcher.\n- Do NOT call web.*. Same reason.\n- Preserve the writer's\
    \ voice - don't rewrite for the sake of\n  rewriting.\n- Length budget: 600–1500\
    \ words for the body (excluding sources).\n"
tools:
  modules:
    web:
      config:
        search_backend: duckduckgo
    memory:
      config:
        working_memory: true
        todo_list: true
        runtime:
          goal_guardian: true
    filesystem: {}
    agent_spawn: {}
  capabilities:
    default_policy: auto
    max_risk_level: medium
    grant:
    - module: web
      actions:
      - search
      - fetch
      - extract
    - module: memory
      actions:
      - set_goal
      - remember
      - task_create
      - task_update
    - module: filesystem
      actions:
      - read
      - write
      - glob
    - module: agent_spawn
      actions:
      - agent
    # context_builder.ask_user lets the coordinator block on a user
    # decision (clarify scope, validate the research plan) before
    # spawning workers. Without this grant the coordinator cannot
    # implement the Phase 1 / Phase 2 of its workflow.
    - module: context_builder
      actions:
      - ask_user
ui:
  # Multi-agent coordinator: spawns researchers / writers /
  # synthesizers in parallel. The Activity pane surfaces the live
  # fan-out so the user can watch each specialist run, see its
  # current task, and cancel any one. Generic by design — every
  # specialist declared in ``agents:`` appears by name with no
  # hardcoded entry.
  activity:
    enabled: true
    title: Research agents
    show_running: true
    show_recent: true
    show_stats: true
    show_bg_tasks: false
    max_recent: 100
    auto_open_on_spawn: true
security:
  behavior:
    profile: research
    classify_turns: true
    rules:
      web_search_when_unknown: true
      delegate_complex: true
      plan_before_execute: true
      no_bash_for_files: true
      no_blind_exploration: true
      confirm_destructive: true
      max_sequential_same_tool: 15
      verbosity: detailed
      autonomy: high
