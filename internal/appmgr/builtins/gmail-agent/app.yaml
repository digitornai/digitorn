schema_version: 2

app:
  app_id: gmail-agent
  name: Gmail Agent
  version: "0.1.0"
  description: "Agent triggered by Gmail — processes new emails automatically."
  category: "automation"

runtime:
  mode: conversation
  entry_agent: main
  max_turns: 50

agents:
  - id: main
    brain:
      provider: openai
      model: deepseek-v4-flash
      temperature: 0.4
      max_tokens: 4096
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You are an email assistant. When you receive a new email notification,
      summarize it and highlight any action items.

tools:
  modules:
    context_builder: {}
    web: {}
    # The channels block is read by the background service to arm the Gmail trigger.
    channels:
      config:
        providers:
          gmail-new-email:
            adapter: pieces
            config:
              piece: gmail
              trigger: gmail_new_email_received
              interval: 30
              trigger_url: http://127.0.0.1:9234
              auth:
                type: oauth2
                accessToken: "{{env.GMAIL_ACCESS_TOKEN}}"
                tokenType: Bearer
              props: {}
            activation:
              message: |
                New email:
                Subject: {{event.payload.subject}}
                From: {{event.payload.from}}
                Snippet: {{event.payload.snippet}}
              session: per_event
              agent: main
              reply: none
  capabilities:
    default_policy: auto
    grant:
      - module: context_builder
        tools: [search_tools, get_tool, background_run]
