schema_version: 2

app:
  app_id: gmail-agent
  name: Gmail Agent
  short_name: "Gmail"
  icon: "📧"
  color: "#EF4444"
  version: "0.1.0"
  description: "Agent triggered by Gmail — processes new emails automatically."
  category: "automation"

runtime:
  mode: conversation
  entry_agent: main
  max_turns: 50

agents:
  - id: main
    brain:
      provider: openai
      model: deepseek-v4-flash
      temperature: 0.4
      max_tokens: 4096
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You are an email assistant. When you receive a new email:
      1. Read and understand the content
      2. Reply using ap_gmail__reply_to_email with the email ID provided, writing a concise and helpful response
      3. Always reply in the same language as the original email

      Use the email id from the message to identify which email to reply to.

tools:
  modules:
    context_builder: {}
    web: {}
    pieces:
      config:
        static_auth:
          gmail:
            type: oauth2
            accessToken: "{{env.GMAIL_ACCESS_TOKEN}}"
            refreshToken: "{{env.GMAIL_REFRESH_TOKEN}}"
            tokenType: Bearer
    # The channels block is read by the background service to arm the Gmail trigger.
    channels:
      config:
        providers:
          gmail-new-email:
            adapter: pieces
            config:
              piece: gmail
              trigger: gmail_new_email_received
              interval: 30
              trigger_url: http://127.0.0.1:9234
              auth:
                type: oauth2
                accessToken: "{{env.GMAIL_ACCESS_TOKEN}}"
                refreshToken: "{{env.GMAIL_REFRESH_TOKEN}}"
                tokenType: Bearer
              props: {}
            activation:
              message: |
                New email received:
                ID: {{event.payload.id}}
                Subject: {{event.payload.subject}}
                From: {{event.payload.from}}
                Body: {{event.payload.snippet}}

                Reply to this email using ap_gmail__reply_to_email with the ID above.
              session: per_event
              agent: main
              reply: none
  capabilities:
    default_policy: auto
    grant:
      - module: context_builder
        tools: [search_tools, get_tool, background_run]
      - module: pieces
        tools: ["*"]
