# server = auto-installé sur le daemon prod ; hub = disponible dans le marketplace.
# provision = comment le prod installe l'app :
#   (absent) / builtin → source embarquée dans le binaire (apps légères, install rapide au boot)
#   hub                → fetchée depuis le hub APRÈS le boot (apps lourdes à web/dist,
#                        gardées HORS du binaire ; provisioning asynchrone non-bloquant)
# Non listé = server:false.

apps:
  # — fondations (légères, embarquées) —
  chat:                  { server: true,  hub: true,  provision: builtin }
  digitorn-code:         { server: true,  hub: true,  provision: builtin }
  digitorn-craft:        { server: true,  hub: true,  provision: builtin }
  support-desk:          { server: true,  hub: false, provision: builtin }   # Digitorn Support Desk (B2B)

  # — retirée du seed —
  ops-alert:             { server: false, hub: false }

  # — apps lourdes à preview web : provisionnées depuis le hub, hors binaire —
  latex:                 { server: true,  hub: true,  provision: hub }
  drawdb:                { server: true,  hub: true,  provision: hub }
  excalidraw:            { server: true,  hub: true,  provision: hub }
  univer:                { server: true,  hub: true,  provision: hub }
