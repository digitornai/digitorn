app:
  app_id: digitorn-scribe
  name: Scribe
  short_name: Scribe
  version: "1.0.0"
  description: >-
    Expert LaTeX writing assistant. Tight compile-feedback loop (tectonic),
    LSP-aware refactoring (texlab), style hygiene (chktex), Supreme Coach
    that calibrates strategy per request.
  category: writing
  icon: ""
  color: "#8B5CF6"
  author: Digitorn
  tags:
    - writing
    - latex
    - academic
    - coach
    - lsp
  quick_prompts:
    - label: Nouveau papier
      icon: 📄
      message: "Démarre un nouveau papier d'article LaTeX sur ce sujet : "
    - label: Nouvelle thèse
      icon: 📚
      message: "Scaffold une structure de thèse multi-chapitre. Sujet : "
    - label: Slides Beamer
      icon: 🎓
      message: "Crée une présentation Beamer de 10-15 slides sur : "
    - label: Corrige les erreurs
      icon: 🔧
      message: "Compile main.tex et corrige toutes les erreurs tectonic + chktex."
    - label: Renomme un label
      icon: 🏷️
      message: "Renomme tous les <fig:XXX> en <fig:YYY> et mets à jour toutes les refs."
    - label: Ajoute une citation
      icon: 📑
      message: "Ajoute cette entrée BibTeX et insère la citation : "
    - label: Passe de style
      icon: ✨
      message: "Fais une passe stylistique (chktex warnings, typographie, cohérence)."

runtime:
  mode: conversation
  workdir_mode: auto
  tool_injection: direct
  direct_modules:
    - workspace
    - lsp
    - memory
  max_turns: 100
  timeout: 1800
  hooks:
    # The LSP diagnose hook fires on every workspace mutation. It is
    # the canonical wire from a write/edit to the agent's `lint` field
    # so the compile-feedback loop is automatic — the agent never has
    # to call lsp.diagnostics manually.
    - id: lint-after-write
      "on": tool_end
      condition:
        type: tool_name
        match: ["workspace.write", "workspace.edit", "write", "edit"]
      action:
        type: lsp_diagnose
        inject_result: true
        publish: true
        read_from_disk: false
    - id: cortege-cleanup-on-tex-delete
      "on": tool_end
      condition:
        type: tool_name
        match: ["workspace.delete", "delete"]
      action:
        type: shell
        command: |
          p="{{tool.params.path}}"
          case "$p" in
            *.tex)
              stem="${p%.tex}"
              for ext in aux log toc bbl blg out synctex.gz pdf fls fdb_latexmk; do
                rm -f "${stem}.${ext}"
              done
              ;;
          esac
        on_error: ignore

modules:
  preview: {}
  web_preview:
    constraints:
      blocked_actions: [proxy, publish, detach]
  workspace:
    config:
      # ``react`` is informational here -- the actual rendering is our
      # static React bundle in web/dist. Anything other than ``code``
      # makes the host show the preview iframe.
      render_mode: react
      entry_file: main.tex
      title: "Scribe LaTeX project"
      sync_to_disk: true
      lint: true
      instructions: |
        You are editing a LaTeX project. All writes mirror to disk where
        tectonic compiles them. After every write/edit, the response carries
        a `lint` field with tectonic + chktex diagnostics — inspect it and
        fix before continuing.
      tool_instructions:
        write: |
          Always provide COMPLETE file content. Inspect the `lint` field of
          the response: if `errors > 0`, fix root cause immediately (do NOT
          delete content to silence errors). Preamble lives in main.tex
          first half — keep it sorted by category (encoding → babel →
          geometry → math → graphics → refs → biblio → custom macros).
        edit: |
          Surgical patches only. `old_string` must be unique. Same lint
          inspection rule as write. For label renames, use replace_all=true
          and pair with WsGrep across all .tex files first.
        grep: |
          BEFORE renaming a `\\label{X}` or a `\\newcommand{\\X}`: WsGrep
          for `X` across the project to capture every `\\ref`, `\\autoref`,
          `\\cref`, `\\cite`, or macro usage. Atomic batch replace prevents
          dangling references after the edit.
        read: |
          Read main.tex first to learn the preamble + custom macros.
          For multi-chapter projects, read the chapter file before editing
          it — the rest of the doc may depend on its labels.
  lsp:
    config:
      # Sprint 2: full multi-protocol stack on .tex. The LSP module
      # now fans out ``notify_change`` to every registered protocol
      # in parallel, and routes ``request()`` (hover/goto/refs) to
      # the LSP-mode one. So all three protocols layer cleanly:
      #   texlab    — LSP server: hover on \frac{}, goto-definition
      #               on \newcommand, find-references on \label,
      #               completion of \cite{} keys.
      #   tectonic  — compiler: produces main.pdf + structured
      #               errors (Undefined control sequence, etc.).
      #   chktex    — linter: stylistic warnings (~ before \ref,
      #               \\ at paragraph end, eqnarray, etc.).
      #
      # Each save fires all three in parallel; their diagnostics are
      # merged with dedup before reaching the agent.
      # Commands are resolved from PATH. If your worker's PATH lookup
      # fails (happens on some Windows setups), replace a bare name with
      # the absolute path to the binary.
      servers:
        texlab:
          command: "texlab run"
          extensions: [".tex"]
          protocol: lsp
          parser: fallback
        tectonic:
          command: "tectonic --keep-logs --print"
          extensions: [".tex", ".bib", ".cls", ".sty", ".pdf", ".png", ".jpg", ".jpeg", ".eps"]
          protocol: compiler
          parser: tectonic
          entry_file: main.tex
        chktex:
          command: "chktex -q"
          extensions: [".tex"]
          protocol: linter
          parser: chktex
  memory: {}
  shell: {}

agents:
  - id: main
    role: assistant
    brain:
      provider: featherless
      backend: openai_compat
      model: deepseek-ai/DeepSeek-V4-Pro
      config:
        api_key: placeholder
      temperature: 0.3
      max_tokens: 8192
      context:
        max_tokens: 200000
      fallback:
        provider: github_copilot
        backend: github_copilot
        model: gpt-5-mini
        config:
          api_key: placeholder
        temperature: 0.3
        max_tokens: 8192
    system_prompt: "{{prompt.writer}}"

security:
  behavior:
    profile: creative
    # Coach REACTIVE après tune de coach.md : section
    # "CONVERSATION PHASE" force le classifier à identifier
    # cold_start / in_progress / refining / interrupted AVANT de
    # classifier, et interdit explicitement les "menu replies"
    # (préférez-vous A/B/C) qui étaient la cause de la
    # réinitialisation observée sur les messages courts.
    #
    # DISABLED 2026-05-18 for prod-test stability — Coach gpt-5-mini via
    # github_copilot adds 10-15 s per turn AND occasionally event-loop
    # stalls the daemon under concurrent load. The writer prompt already
    # carries enough discipline (compile-feedback loop, lint-driven fixes,
    # WsGrep-before-rename) that durable rules from Coach were rarely
    # firing anyway. Flip back to true only if you observe the writer
    # drifting on a specific project and want a SESSION-level pinning
    # rule from Coach.
    classify_turns: false
    brain:
      # Same github_copilot relay as the writer agent -- the coach
      # only runs once per turn (classification, small output) so
      # using the same proven provider keeps the stack uniform.
      provider: github_copilot
      backend: github_copilot
      model: gpt-5-mini
      config:
        api_key: placeholder
      temperature: 0.1
      max_tokens: 1024
    classifier:
      frequency: every_turn
      skip_followups: true
      timeout: 15
      system_prompt: "{{prompt.coach}}"
      context:
        tool_inventory: true
        session_state: true
        workspace_info: true
        recent_history: true
        history_depth: 10
      # LaTeX-specific archetypes (mapped onto the existing
      # complexity / approach / risk taxonomy the engine expects).
      complexity_levels:
        - name: trivial
          when: "1 sentence answer, no edit (e.g. 'how do I bold text?')"
          behavior: "Reply in 1-3 sentences with a code snippet. NO tool calls."
        - name: simple
          when: "Single-file edit with clear target (add one paragraph, fix one tectonic error)"
          behavior: "WsRead if context unclear → WsEdit → inspect lint → done."
        - name: moderate
          when: "Multi-section addition, scaffold new doc, fix 3+ errors"
          behavior: "WsRead the preamble + main.tex → state plan in 2-3 lines → WsWrite/WsEdit → compile → fix loop."
        - name: complex
          when: "Multi-file thesis change, package refactor, citation migration"
          behavior: "WsGlob to enumerate files → WsRead key entry points → numbered plan in text → AskUser to validate → execute → verify with full compile."
        - name: critical
          when: "Class change (\\documentclass), preamble rewrite, mass label rename, delete chapter"
          behavior: "MANDATORY AskUser before touching ANY file. Show exact diff plan. Snapshot mental state of what could break."
      approaches:
        - name: direct
          label: Direct write
          when: "Trivial/simple, well-scoped, single file"
          behavior: "WsEdit/WsWrite immediately. Minimal text."
        - name: read_first
          label: Read then act
          when: "Extending an existing doc or editing a file > 100 lines"
          behavior: "WsRead the target + preamble → match style → edit. Preserves voice and macros."
        - name: scaffold
          label: Scaffold new document
          when: "User asks for a NEW document (paper, thesis, slides)"
          behavior: "WsWrite main.tex directly with preamble + title/author/date/abstract → compile to verify."
        - name: batch_replace
          label: Atomic batch replace
          when: "Renaming a label, macro, or citation key across the project"
          behavior: "WsGrep target → WsEdit with replace_all=true on each file → recompile → verify zero 'undefined' warnings."
        - name: iterate_compile
          label: Tight compile loop
          when: "Multiple errors in lint field, or unfamiliar package"
          behavior: "Address ONE error at a time. After each WsEdit, re-read lint. Don't batch error fixes — root-cause each."
        - name: explain_only
          label: Explain, do not edit
          when: "User asks 'why does X fail' or 'what's the right way to Y'"
          behavior: "Answer in plain text with a minimal code snippet. NO writes until user explicitly asks."
      risk_levels:
        - name: none
          when: "Read-only, questions, explanations"
        - name: low
          when: "Adding a paragraph, fixing a typo, adding a citation"
        - name: medium
          when: "Preamble changes, new \\usepackage, restructuring a section"
          behavior: "State what is changing and why, in one sentence."
        - name: high
          when: "Class change, mass label rename, deleting >50 lines, dropping a package other content depends on"
          behavior: "MUST AskUser with the exact target list. Explain breaking impact."
      max_directives: 5
      directive_prefix: "[Scribe project rule]"
      high_risk_threshold: medium
      high_risk_warning: "Risk: {risk}. AskUser before destructive / hard-to-reverse actions."

capabilities:
  default_policy: auto
  grant:
    - module: workspace
      actions: [write, read, edit, glob, grep, delete]
    - module: lsp
      actions: [diagnostics, check, request, notify_change]
    - module: memory
      actions: [remember, set_goal, task_create, task_update]
    - module: context_builder
      actions: [ask_user]
  hidden_actions:
    - module: shell
      actions: [bash]
