# Digitorn Craft — AI app builder
#
# Pick a starter template (portfolio, landing, dashboard, …) or
# describe what you want; the agent scaffolds a real Vite + React
# project on disk, installs dependencies, runs ``npm run build``,
# and the daemon auto-serves ``dist/`` in the Preview tab.

[package]
id = "digitorn-craft"
name = "Digitorn Craft"
version = "0.1.0"
description = "React + Vite AI builder. Pick a template or describe an app; the agent writes code, installs deps, and ships a production build."
author = "Digitorn"
license = "MIT"
category = "development"

[package.source]
type = "official"
verified = true
publisher = "digitorn"

[package.compatibility]
digitorn_min = ">=1.0.0"

[package.requirements]
modules = ["bash", "filesystem", "memory", "context_builder", "lsp"]
recommended_models = ["claude-haiku-4-5", "claude-sonnet-4-6"]
external_tools = []

[package.credentials]
required = []
optional = ["anthropic"]

[package.permissions]
risk_level = "low"
network_access = false
filesystem_access = []
filesystem_scopes = []
requires_approval = []

[package.hub]
tags = ["builder", "react", "vite", "no-code", "craft", "templates", "official"]

[package.release]
released_at = "2026-05-09"
release_notes = "Initial release with the new templates gallery: portfolio-minimal seeded, more starters incoming."
breaking = false
