# Digitorn Lovable — Lovable-style AI app builder
#
# Pick a starter template (portfolio, landing, dashboard, …) or
# describe what you want; the agent scaffolds a real Vite + React
# project on disk, runs its dev server, and registers it through
# web_preview so the user's Preview tab loads the live HMR build.

[package]
id = "digitorn-lovable"
name = "Digitorn Lovable"
version = "0.1.0"
description = "Lovable-style AI builder. Pick a template or describe an app, the agent ships a live preview in seconds."
author = "Digitorn"
license = "MIT"
category = "development"

[package.source]
type = "official"
verified = true
publisher = "digitorn"

[package.compatibility]
digitorn_min = ">=1.0.0"

[package.requirements]
modules = ["preview", "web_preview", "shell", "workspace", "memory", "context_builder"]
recommended_models = ["claude-haiku-4-5", "claude-sonnet-4-6"]
external_tools = []

[package.credentials]
required = []
optional = ["anthropic"]

[package.permissions]
risk_level = "low"
network_access = false
filesystem_access = []
filesystem_scopes = []
requires_approval = []

[package.hub]
tags = ["builder", "react", "no-code", "lovable", "templates", "official"]

[package.release]
released_at = "2026-05-09"
release_notes = "Initial release with the new templates gallery: portfolio-minimal seeded, more starters incoming."
breaking = false
