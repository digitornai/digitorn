# Minimal Digitorn app: one agent backed by zen-mimo-v2.5-free via the gateway,
# with read-only filesystem access.
# Schema matches packages/digitorn/core/app/schema.py (AppDefinition v2).
schema_version: 2

app:
  app_id: chat
  name: Chat
  short_name: "Chat"
  icon: "💬"
  color: "#6366F1"
  version: "0.1.0"
  description: "General-purpose assistant with read-only codebase access. Zero setup — chat in the web app or CLI."
  author: "you@example.com"
  category: "coding"

ui:
  workspace:
    position: hidden

agents:
  - id: main
    role: worker
    brain:
      # zen-mimo-v2.5-free via the Digitorn gateway (provider
      # opencode_zen_public). api_key + base_url are placeholders ignored
      # on the gateway path for authenticated users.
      provider: openai
      backend: openai_compat
      model: zen-mimo-v2.5-free
      temperature: 0.7
      max_tokens: 8192
      config:
        api_key: placeholder
        base_url: https://api.openai.com/v1
    system_prompt: |
      You are a helpful assistant with filesystem access.
      Use filesystem.read and filesystem.grep when you need to look at code.
    modules:
      - filesystem

tools:
  modules:
    filesystem:
      config:
        workspace: "."
        max_file_bytes: 1048576
  capabilities:
    default_policy: auto
    grant:
      - module: filesystem
        tools: [read, glob, grep]
