app:
  app_id: notes-lm
  name: Notes LM
  short_name: Notes
  version: "2.0.0"
  description: "Upload sources, get grounded answers with verbatim citations, briefings, mind maps, audio overviews. Read-direct, no RAG."
  category: research
  icon: ""
  color: "#6366F1"
  author: mbathe
  tags:
    - research
    - notebook
    - citations
  quick_prompts:
    - label: Add a source
      icon: 📥
      message: "Add this source: <paste URL or upload a file>"
    - label: Briefing
      icon: 📄
      message: "Write a briefing document covering all my sources."
    - label: Mind map
      icon: 🧭
      message: "Build a mind map of my sources."
    - label: Timeline
      icon: 📆
      message: "Extract a chronological timeline from my sources."
    - label: Study guide
      icon: 🎓
      message: "Turn my sources into a study guide (concepts + FAQ + quiz)."
    - label: Audio overview
      icon: 🎙️
      message: "Generate a 5-minute audio overview between two hosts."
  attachments: "*"
  attachments_mode: tool

runtime:
  mode: conversation
  max_turns: 80

agents:
  - id: main
    role: researcher
    capabilities:
      - ingest
      - answer
      - briefing
      - mindmap
      - timeline
      - study_guide
      - audio_overview
      - form
    brain:
      # gpt-5-mini via the GitHub Copilot relay (through the gateway).
      # The system_prompt heal in ``manager_v2/_chat.py`` guarantees
      # ``messages[0]`` carries the resolved Notes LM prompt on every
      # turn. ``placeholder`` api_key is hot-swapped at session start
      # by the gateway resolver against the user's Copilot creds.
      #
      # NOTE: local Ollama models (qwen2.5:7b/14b) were evaluated as a
      # fallback. The 14b Q3 has excellent quality but the ~30K-char
      # Notes LM system prompt + tool loop on an 8GB laptop GPU pushes
      # a single turn past 120s and stalls the daemon. gpt-5-mini via
      # the gateway is both the prod config AND fast enough.
      provider: github_copilot
      backend: github_copilot
      model: gpt-5-mini
      config:
        api_key: placeholder
      temperature: 0.3
      max_tokens: 8192
      context:
        max_tokens: 131072
    system_prompt: '{{prompt.system}}'

tools:
  modules:
    web:
      config:
        search_backend: duckduckgo
    http:
      config: {}
      constraints:
        # Narrow to just the verbs the audio_overview skill uses for OpenAI
        # TTS. Hiding submit_form etc. avoids leaking schemas that strict-
        # mode upstreams (Copilot / gpt-5-mini via gateway) reject on
        # ``dict[str, str]`` properties.
        allowed_actions: [post, get]
    memory:
      config:
        auto_remember: false
        # working_memory exposes goal/task tools (MemorySetGoal,
        # TaskCreate, ...). Notes LM is a single-shot grounded
        # assistant - it has no use for multi-step goal tracking, and
        # exposing those tools made gpt-5-mini "plan" (set a goal) then
        # END the turn without doing the work (briefing.md never
        # written). Disabled so the agent executes WsGlob -> WsRead ->
        # WsWrite directly in one turn.
        working_memory: false
    # Preview module - the SSE transport that mirrors every workspace
    # mutation to the iframe via the ``files`` resource channel. The
    # agent never calls it directly; workspace.write -> preview internally.
    preview: {}
    # Web preview - serves ``web/dist/index.html`` at
    # ``/api/apps/notes-lm/preview/`` via the daemon's
    # ``auto_attach_bundled_dist`` on session start. The custom React
    # UI lives there.
    web_preview: {}
    workspace:
      config:
        # ``react`` is informational - the actual rendering is our
        # static React bundle in web/dist. Anything other than
        # ``code`` makes the host show the preview iframe.
        render_mode: react
        title: "Notes LM"
        entry_file: briefing.md
        sync_to_disk: false
        auto_approve: true
        # Built-in content validators (JSON, YAML, TOML, Python) run on
        # every WsWrite/WsEdit. The validator output is returned to the
        # agent as a ``lint: [...]`` field on the tool result so it can
        # self-correct broken JSON forms in the same turn instead of
        # leaving the iframe stuck on "Couldn't parse this form".
        lint: true
    context_builder: {}
  capabilities:
    default_policy: auto
    grant:
      - module: web
        actions:
          - search
          - fetch
          - extract
      - module: http
        actions:
          - post
          - get
      - module: memory
        actions:
          - remember
      - module: workspace
        actions:
          - write
          - read
          - edit
          - glob
          - grep
          - delete

ui:
  greeting: "Drop a source (URL, file, text) via the + button or the paperclip. Ask any question — I'll read the relevant file(s) and cite the exact line range."
  workspace:
    render_mode: react
    title: "Notes LM"
    position: right
    width_pct: 70
    default_open: true
    auto_open_on_first_tool: true
    default_view: preview
    hidden_views: [code, changes]
    preview_chrome:
      enabled: true
      refresh: true
      open_in_new_tab: true
      viewport_toggle: false
      url_bar: never
