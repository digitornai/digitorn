server:
  host: 127.0.0.1
  port: 8000
  read_timeout: 60s
  write_timeout: 60s
  shutdown_timeout: 5s

database:
  driver: sqlite

sessions:
  num_shards: 2
  queue_cap_per_shard: 1024
  batch_max: 50
  flush_interval: 5ms
  fsync: true

auth:
  enabled: false
  dev_mode: true

workers:
  llm:
    count: 0
  embeddings:
    count: 1
    backend: onnx
    start_timeout: 120s
    client_timeout: 30s
  tokenizer:
    count: 0
  pools:
    - id: rag
      modules: [rag]
      count: 1

logging:
  level: info
  format: tint
