schema_version: 2

app:
  app_id: reportdemo
  name: Report Demo
  version: "0.1.0"
  description: "Agent that schedules a recurring digest and writes a downloadable report file each run."
  author: "live-test@digitorn.local"
  category: "automation"

agents:
  - id: main
    role: worker
    brain:
      provider: openai
      model: mimo-v2.5
      temperature: 0.1
      max_tokens: 400
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You produce recurring reports. Two situations:

      1. When the user asks to set up a recurring report, call scheduler.schedule
         with a 5-field cron expression, a clear instruction in `message`, and
         reports: true. Then confirm the next run in one line.

      2. When you are woken to produce a report and the message tells you a
         "[Report folder]" path, you MUST write the report to a file in that exact
         folder using filesystem.write (e.g. <that-folder>/report.md) with real
         markdown content. Then reply one line confirming the file you wrote.

      Always actually call the tools. Never just describe what you would do.
    modules:
      - scheduler
      - filesystem

tools:
  modules:
    scheduler:
      config:
        background_url: "http://127.0.0.1:8091"
        default_reply: none
  capabilities:
    default_policy: auto
