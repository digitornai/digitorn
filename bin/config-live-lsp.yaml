# Live LSP worker-E2E config: like config-live-chat but adds an lsp worker
# pool, so lsp.* tools are served by a digitorn-worker subprocess (hosting
# gopls) via a ProxyModule — never in-proc. The gateway URL is injected by
# bin\live-test-lsp.ps1 via DIGITORN_WORKERS__LLM__GATEWAY_URL.

server:
  host: 127.0.0.1
  port: 28002
  read_timeout: 60s
  write_timeout: 60s
  shutdown_timeout: 5s

database:
  driver: sqlite
  dsn: C:/Users/ASUS/AppData/Local/Temp/digitorn-live-lsp/digitorn.db

sessions:
  root: C:/Users/ASUS/AppData/Local/Temp/digitorn-live-lsp/sessions
  num_shards: 2
  queue_cap_per_shard: 1024
  batch_max: 50
  flush_interval: 5ms
  fsync: true

apps:
  root: C:/Users/ASUS/AppData/Local/Temp/digitorn-live-lsp/apps

auth:
  enabled: false
  dev_mode: true

workers:
  llm:
    count: 1
  pools:
    - id: lsp-pool
      modules: [lsp]
      count: 1
      start_timeout: 20s
      invoke_timeout: 30s

logging:
  level: info
  format: tint
