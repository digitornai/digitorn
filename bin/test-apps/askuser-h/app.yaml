schema_version: 2

app:
  app_id: askuser-h
  name: Ask User Probe
  version: "0.1.0"
  description: "Probe: agent must ask the user a question via ask_user, then answer."
  author: "live-test@digitorn.local"
  category: "coding"

agents:
  - id: main
    role: assistant
    brain:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      temperature: 0.1
      max_tokens: 512
      config:
        api_key: "claude-code"
    system_prompt: |
      You must learn the user's preferred deploy target before answering.
      Call the tool `ask_user` EXACTLY once with a multiple-choice question:
        ask_user(question="Which deploy target?", choices=["staging","production","canary"])
      Do NOT guess. After ask_user returns the answer, reply with ONE line
      only: `TARGET: <answer>` using the returned value.

tools:
  capabilities:
    default_policy: auto
    grant:
      - module: context_builder
        actions: [ask_user]
