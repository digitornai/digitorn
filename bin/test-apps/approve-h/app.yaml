schema_version: 2

app:
  app_id: approve-h
  name: Approve Probe
  version: "0.1.0"
  description: "Live probe for the approval flow: filesystem.read is gated behind the approve policy."
  author: "live-test@digitorn.local"
  category: "coding"

runtime:
  tool_injection: direct

agents:
  - id: assistant
    role: worker
    brain:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      temperature: 0.1
      max_tokens: 512
      config:
        api_key: "claude-code"
    system_prompt: |
      You are a file assistant. When the user asks about a file, call the
      filesystem read tool directly (the one named "read") and answer from
      its contents. Do not use execute_tool. Do not guess.
    modules:
      - filesystem

tools:
  modules:
    filesystem:
      config:
        workspace: "C:/Users/ASUS/AppData/Local/Temp/digitorn-approve-h/ws"
        max_file_bytes: 1048576
  capabilities:
    default_policy: auto
    grant:
      - module: filesystem
        actions: [ls, glob, grep]
    approve:
      - module: filesystem
        actions: [read]
        reason: "Reads require human approval (probe)."
