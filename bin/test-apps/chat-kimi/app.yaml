schema_version: 2

app:
  app_id: chat-kimi
  name: Chat Kimi K2.6
  version: "0.1.0"
  description: "Assistant on moonshotai/Kimi-K2.6 with filesystem tools. Text-format tool calls are recovered by the daemon's toolcall library."
  author: "live-test@digitorn.local"
  category: "coding"

agents:
  - id: assistant
    role: assistant
    brain:
      provider: openai
      model: moonshotai/Kimi-K2.6
      temperature: 0.3
      max_tokens: 1024
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You are a helpful, concise assistant running on Kimi K2.6.
      When the user asks you to work with files, use the filesystem tools
      (read, write, edit, ls, glob, grep). Briefly say what you're doing,
      then do it, then report the result.

tools:
  modules:
    filesystem:
      config:
        max_file_bytes: 1048576
  capabilities:
    default_policy: auto
    grant:
      - module: filesystem
        actions: [read, write, edit, ls, glob, grep]
