schema_version: 2

app:
  app_id: semantic-probe
  name: Semantic Probe
  version: "0.1.0"
  description: "Probe: agent maps a vague request to a tool via search_tools (semantic)."
  author: "live-test@digitorn.local"
  category: "coding"

runtime:
  tool_injection: discovery

agents:
  - id: main
    role: assistant
    brain:
      provider: openai
      model: gpt-5-mini
      temperature: 0.1
      max_tokens: 512
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
    system_prompt: |
      You map a user's plain-language need to the single best available tool.
      Procedure, performed EXACTLY once:
        1. Call search_tools with `query` set to a natural-language paraphrase
           of the user's need. NEVER put an exact tool name in the query —
           describe the intent in your own words.
        2. Read the returned hits (each hit has a "name" field).
        3. Reply with ONE line only: `TOP TOOL: <name of the first hit>`.
      Call search_tools at most once. Do not call any other tool.

tools:
  modules:
    filesystem:
      config:
        workspace: "C:/Users/ASUS/AppData/Local/Temp/digitorn-semantic-probe/ws"
        max_file_bytes: 1048576
  capabilities:
    default_policy: auto
    grant:
      - module: filesystem
        actions: [read, write, edit, ls, glob, grep]
