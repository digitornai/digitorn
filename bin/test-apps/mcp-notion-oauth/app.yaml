schema_version: 2
app:
  app_id: mcp-notion-oauth
  name: MCP Notion OAuth (by URL)
  version: "0.1.0"
  description: "Proves zero-config OAuth: Notion declared by URL only, discovered + dynamically registered, agent uses it live."
  author: "paul@digitorn.ai"
  category: "coding"

agents:
  - id: main
    role: worker
    max_tool_iterations: 16
    brain:
      provider: openai
      model: mimo-v2.5
      temperature: 0.1
      max_tokens: 2048
      config:
        api_key: "{{env.OPENAI_API_KEY}}"
      context:
        max_tokens: 1000000
    system_prompt: |
      You are connected to the user's real Notion workspace via an MCP server whose
      tools are in your tool list. To find pages, call the Notion search tool exactly
      as it appears in your tool list (never invent a name). Report what the tool
      returns verbatim, including page titles. No emoji, no preamble.
    modules:
      - mcp

tools:
  modules:
    mcp:
      config:
        servers:
          notion:
            transport: streamable_http
            url: https://mcp.notion.com/mcp
            auth:
              type: oauth2
            sandbox:
              permissions: [net.http]
  capabilities:
    default_policy: auto
    grant:
      - module: mcp
