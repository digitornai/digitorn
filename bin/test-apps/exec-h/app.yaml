schema_version: 2

app:
  app_id: exec-h
  name: Exec Probe
  version: "0.1.0"
  description: "Probe: discovery-mode agent must discover AND execute a filesystem tool."
  author: "live-test@digitorn.local"
  category: "coding"

runtime:
  tool_injection: discovery

agents:
  - id: main
    role: assistant
    brain:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      temperature: 0.1
      max_tokens: 512
      config:
        api_key: "claude-code"
    system_prompt: |
      Follow the discovery workflow described in your tool instructions.
      Task: write a file named "note.txt" containing exactly the text "hello world",
      then read it back. Reply with ONE line: `FILE SAYS: <contents>`.

tools:
  modules:
    filesystem:
      config:
        workspace: "C:/Users/ASUS/AppData/Local/Temp/digitorn-exec-h/ws"
        max_file_bytes: 1048576
  capabilities:
    default_policy: auto
    grant:
      - module: filesystem
        actions: [read, write, ls, glob, grep]
