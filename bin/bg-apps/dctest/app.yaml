app:
  app_id: chat

tools:
  modules:
    channels:
      config:
        providers:
          dc:
            adapter: discord
            enabled: true
            config:
              token: "{{secret.DISCORD_TOKEN}}"
            activation:
              # Mode A : one persistent session per Discord channel → the bot
              # remembers the conversation across messages.
              session: "dckimi-{{event.source}}"
              message: "{{event.message}}"
              model: "moonshotai/kimi-k2.6"
              reply: auto
