server:
  host: 127.0.0.1
  port: 28003
  read_timeout: 60s
  write_timeout: 60s
  shutdown_timeout: 5s

database:
  driver: sqlite
  dsn: C:/Users/ASUS/AppData/Local/Temp/digitorn-gate-probe/digitorn.db

sessions:
  root: C:/Users/ASUS/AppData/Local/Temp/digitorn-gate-probe/sessions
  num_shards: 2
  queue_cap_per_shard: 1024
  batch_max: 50
  flush_interval: 5ms
  fsync: true

apps:
  root: C:/Users/ASUS/AppData/Local/Temp/digitorn-gate-probe/apps

auth:
  enabled: false
  dev_mode: true

workers:
  llm:
    count: 1
    start_timeout: 15s

logging:
  level: info
  format: tint
