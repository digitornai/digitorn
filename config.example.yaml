# Digitorn Go - Example configuration
# Copy to config.yaml and adjust for your environment

server:
  host: "127.0.0.1"
  port: 8000
  read_timeout: "30s"
  write_timeout: "30s"
  shutdown_timeout: "30s"
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  auth_enabled: true

socketio:
  ping_interval: "25s"
  ping_timeout: "20s"
  max_http_buffer_size: 1000000  # 1 MB
  connect_timeout: "45s"
  # Redis adapter for horizontal scaling (optional)
  redis_url: ""  # e.g. "redis://localhost:6379/0"

database:
  # Supported drivers: postgres, mysql, sqlite, sqlserver, oracle
  driver: "sqlite"
  dsn: "digitorn.db"
  # Examples:
  #   postgres:  "host=localhost user=digitorn password=secret dbname=digitorn port=5432 sslmode=disable"
  #   mysql:     "digitorn:secret@tcp(localhost:3306)/digitorn?charset=utf8mb4&parseTime=True&loc=Local"
  #   sqlserver: "sqlserver://digitorn:secret@localhost:1433?database=digitorn"
  #   oracle:    "digitorn/secret@localhost:1521/XE"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
  log_level: "warn"  # silent, error, warn, info

modules:
  # Discovery: scan these directories for modules
  paths:
    - "internal/modules"
  # Whitelist (empty = load all discovered)
  enabled: []
  # Blacklist
  disabled: []

runtime:
  max_turns: 200
  max_consecutive_failures: 8
  tool_timeout: "4m"
  context_pressure_threshold: 0.75
  streaming: true

  # Safety watchdog: resets on every LLM round or tool batch completion.
  # Increase for agents that run long tasks (builds, scans, deep research).
  turn_idle_timeout: "10m"

  # --- Turn pool (3 tiers) ---
  # Zero on any tier = unbounded (acceptable for dev/test, never for production).
  max_concurrent_turns_global: 4096
  max_concurrent_turns_per_app: 1024  # raised from default 256
  max_concurrent_turns_per_user: 128  # raised from default 32

  # --- Multi-agent parallelism ---
  # 0 = unbounded: every sub-agent calls the LLM concurrently.
  # Set a positive value only to cap provider costs / rate-limit exposure.
  max_concurrent_llm_calls: 128

  # Delegation tree caps (anti fork-bomb).
  max_agent_depth: 8
  max_agents_per_session: 100000

workers:
  llm:
    # count=1 is sufficient: the worker multiplexes all gRPC streams over HTTP/2.
    # Raise to 2-3 only if you observe CPU saturation inside the worker process.
    count: 1
    concurrency: 512     # max concurrent provider calls inside the worker (default 256)
    buffer_size: 32768   # streaming buffer per call in bytes (default 16384)
    client_timeout: "120s"  # raised for long reasoning / thinking-mode calls
    # Per-provider concurrency overrides (lower-case provider name).
    # Tune to match your API plan tier (e.g. Anthropic tier-4 = 1000 RPM).
    per_provider_concurrency:
      anthropic: 512
      openai: 512
      deepseek: 128
      ollama: 64

  # Generic module worker pools — each entry spawns `count` subprocesses.
  # Use transport: "unix" for tools that are called frequently (filesystem, bash):
  # AF_UNIX sockets have ~2.8x lower round-trip latency than TCP loopback.
  # pools:
  #   - id: "fast-tools"
  #     modules: ["filesystem", "bash"]
  #     count: 2
  #     transport: "unix"

logging:
  level: "info"  # debug, info, warn, error
  format: "tint"  # tint (color), json

llm:
  providers:
    anthropic:
      api_key: ""  # or env: ANTHROPIC_API_KEY
    openai:
      api_key: ""  # or env: OPENAI_API_KEY
    ollama:
      base_url: "http://localhost:11434"

observability:
  metrics_enabled: true
  metrics_path: "/metrics"
  tracing_enabled: false
  otlp_endpoint: ""
